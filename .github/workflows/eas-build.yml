name: EAS Build Android

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches:
      - main

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_TMDB_API_KEY: ${{ secrets.EXPO_PUBLIC_TMDB_API_KEY }}
      EXPO_PUBLIC_TMDB_BASE_URL: ${{ secrets.EXPO_PUBLIC_TMDB_BASE_URL }}
      EXPO_PUBLIC_TMDB_IMAGE_URL: ${{ secrets.EXPO_PUBLIC_TMDB_IMAGE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Environment Variables
        run: |
          echo "🔍 Validating required environment variables..."
          
          MISSING_VARS=()
          
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            MISSING_VARS+=("EXPO_TOKEN")
          fi
          
          if [ -z "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_SUPABASE_URL")
          fi
          
          if [ -z "${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_SUPABASE_ANON_KEY")
          fi
          
          if [ -z "${{ secrets.EXPO_PUBLIC_TMDB_API_KEY }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_TMDB_API_KEY")
          fi
          
          if [ -z "${{ secrets.EXPO_PUBLIC_TMDB_BASE_URL }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_TMDB_BASE_URL")
          fi
          
          if [ -z "${{ secrets.EXPO_PUBLIC_TMDB_IMAGE_URL }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_TMDB_IMAGE_URL")
          fi
          
          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "❌ BUILD FAILED: Missing required environment variables:"
            for var in "${MISSING_VARS[@]}"; do
              echo "   - $var"
            done
            exit 1
          fi
          
          echo "✅ All required environment variables are set"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android (Local)
        run: eas build --platform android --profile production --local --non-interactive --wait

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: "**/*.aab"
