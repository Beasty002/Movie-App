name: EAS Build Android

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches:
      - main

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_TMDB_API_KEY: ${{ vars.EXPO_PUBLIC_TMDB_API_KEY }}
      EXPO_PUBLIC_TMDB_BASE_URL: ${{ vars.EXPO_PUBLIC_TMDB_BASE_URL }}
      EXPO_PUBLIC_TMDB_IMAGE_URL: ${{ vars.EXPO_PUBLIC_TMDB_IMAGE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Environment Variables
        run: |
          echo "🔍 Validating required environment variables..."
          
          MISSING_VARS=()
          FOUND_VARS=()
          
          # Check Repository Secret
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            MISSING_VARS+=("EXPO_TOKEN (Repository Secret)")
          else
            FOUND_VARS+=("✓ EXPO_TOKEN")
          fi
          
          # Check Repository Environment variables
          if [ -z "${{ vars.EXPO_PUBLIC_SUPABASE_URL }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_SUPABASE_URL (Repository Environment)")
          else
            FOUND_VARS+=("✓ EXPO_PUBLIC_SUPABASE_URL")
          fi
          
          if [ -z "${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_SUPABASE_ANON_KEY (Repository Environment)")
          else
            FOUND_VARS+=("✓ EXPO_PUBLIC_SUPABASE_ANON_KEY")
          fi
          
          if [ -z "${{ vars.EXPO_PUBLIC_TMDB_API_KEY }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_TMDB_API_KEY (Repository Environment)")
          else
            FOUND_VARS+=("✓ EXPO_PUBLIC_TMDB_API_KEY")
          fi
          
          if [ -z "${{ vars.EXPO_PUBLIC_TMDB_BASE_URL }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_TMDB_BASE_URL (Repository Environment)")
          else
            FOUND_VARS+=("✓ EXPO_PUBLIC_TMDB_BASE_URL")
          fi
          
          if [ -z "${{ vars.EXPO_PUBLIC_TMDB_IMAGE_URL }}" ]; then
            MISSING_VARS+=("EXPO_PUBLIC_TMDB_IMAGE_URL (Repository Environment)")
          else
            FOUND_VARS+=("✓ EXPO_PUBLIC_TMDB_IMAGE_URL")
          fi
          
          # Print found variables
          echo ""
          echo "Found variables:"
          for var in "${FOUND_VARS[@]}"; do
            echo "  $var"
          done
          
          # Handle missing variables
          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo ""
            echo "❌ BUILD FAILED: Missing required variables:"
            for var in "${MISSING_VARS[@]}"; do
              echo "  ✗ $var"
            done
            echo ""
            echo "📋 Setup Instructions:"
            echo "  1. Go to Settings → Environments → production"
            echo "  2. Add missing variables to the 'Environment variables' section"
            echo "  3. For EXPO_TOKEN: Add to Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi
          
          echo ""
          echo "✅ All required variables are set. Build proceeding..."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.EXPO_PUBLIC_TMDB_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_TMDB_BASE_URL=${{ secrets.EXPO_PUBLIC_TMDB_BASE_URL }}" >> .env
          echo "EXPO_PUBLIC_TMDB_IMAGE_URL=${{ secrets.EXPO_PUBLIC_TMDB_IMAGE_URL }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android (Local)
        run: eas build --platform android --profile production --local --non-interactive --wait

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: "**/*.aab"
