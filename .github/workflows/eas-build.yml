name: EAS Build Android

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches:
      - main

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_TMDB_API_KEY: ${{ vars.EXPO_PUBLIC_TMDB_API_KEY }}
      EXPO_PUBLIC_TMDB_BASE_URL: ${{ vars.EXPO_PUBLIC_TMDB_BASE_URL }}
      EXPO_PUBLIC_TMDB_IMAGE_URL: ${{ vars.EXPO_PUBLIC_TMDB_IMAGE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Environment Variables
        run: |
          echo "Validating required environment variables..."
          MISSING=()
          [ -z "$EXPO_TOKEN" ] && MISSING+=("EXPO_TOKEN")
          [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] && MISSING+=("EXPO_PUBLIC_SUPABASE_URL")
          [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ] && MISSING+=("EXPO_PUBLIC_SUPABASE_ANON_KEY")
          [ -z "$EXPO_PUBLIC_TMDB_API_KEY" ] && MISSING+=("EXPO_PUBLIC_TMDB_API_KEY")
          [ -z "$EXPO_PUBLIC_TMDB_BASE_URL" ] && MISSING+=("EXPO_PUBLIC_TMDB_BASE_URL")
          [ -z "$EXPO_PUBLIC_TMDB_IMAGE_URL" ] && MISSING+=("EXPO_PUBLIC_TMDB_IMAGE_URL")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "BUILD FAILED - missing values: ${MISSING[*]}"
            echo "EXPO_TOKEN -> Settings -> Secrets and variables -> Actions -> Secrets"
            echo "EXPO_PUBLIC_* -> Settings -> Secrets and variables -> Actions -> Variables -> Environment variables (production)"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY}" >> .env
          echo "EXPO_PUBLIC_TMDB_API_KEY=${EXPO_PUBLIC_TMDB_API_KEY}" >> .env
          echo "EXPO_PUBLIC_TMDB_BASE_URL=${EXPO_PUBLIC_TMDB_BASE_URL}" >> .env
          echo "EXPO_PUBLIC_TMDB_IMAGE_URL=${EXPO_PUBLIC_TMDB_IMAGE_URL}" >> .env

      - name: Verify .env file
        run: |
          echo "Verifying .env file was created and all values are populated..."
          if [ ! -f .env ]; then
            echo ".env file was not created"
            exit 1
          fi
          MISSING=()
          get_env_val() { grep "^$1=" .env | cut -d'=' -f2-; }
          [ -z "$(get_env_val EXPO_PUBLIC_SUPABASE_URL)" ]    && MISSING+=("EXPO_PUBLIC_SUPABASE_URL")
          [ -z "$(get_env_val EXPO_PUBLIC_SUPABASE_ANON_KEY)" ] && MISSING+=("EXPO_PUBLIC_SUPABASE_ANON_KEY")
          [ -z "$(get_env_val EXPO_PUBLIC_TMDB_API_KEY)" ]    && MISSING+=("EXPO_PUBLIC_TMDB_API_KEY")
          [ -z "$(get_env_val EXPO_PUBLIC_TMDB_BASE_URL)" ]   && MISSING+=("EXPO_PUBLIC_TMDB_BASE_URL")
          [ -z "$(get_env_val EXPO_PUBLIC_TMDB_IMAGE_URL)" ]  && MISSING+=("EXPO_PUBLIC_TMDB_IMAGE_URL")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ".env file has empty values for: ${MISSING[*]}"
            echo "This means the GitHub Variables were empty when the .env was written."
            exit 1
          fi
          echo ".env file verified — all 5 values are present."

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Validate env var formats
        run: |
          if ! echo "$EXPO_PUBLIC_SUPABASE_URL" | grep -qE '^https://[a-zA-Z0-9.-]+\.supabase\.co$'; then
            echo "EXPO_PUBLIC_SUPABASE_URL does not look like a valid Supabase URL: $EXPO_PUBLIC_SUPABASE_URL"
            exit 1
          fi
          if ! echo "$EXPO_PUBLIC_TMDB_BASE_URL" | grep -qE '^https://'; then
            echo "EXPO_PUBLIC_TMDB_BASE_URL must start with https://"
            exit 1
          fi
          if ! echo "$EXPO_PUBLIC_TMDB_IMAGE_URL" | grep -qE '^https://'; then
            echo "EXPO_PUBLIC_TMDB_IMAGE_URL must start with https://"
            exit 1
          fi
          echo "All env var formats look correct."

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clear build caches
        run: |
          npm cache clean --force
          rm -rf ~/.gradle/caches
          echo "Build caches cleared"

      - name: Build Android (Local)
        run: eas build --platform android --profile production --local --non-interactive --wait --clear-cache

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: "**/*.aab"
